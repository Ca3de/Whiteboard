<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whiteboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="toolbar">
    <button class="tool active" data-tool="select" title="Select / Move">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>
    </button>
    <button class="tool" data-tool="box" title="Process Path (Box)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>
    </button>
    <button class="tool" data-tool="draw" title="Draw">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg>
    </button>
    <button class="tool" data-tool="note" title="Sticky Note">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M14 3v8h8"/></svg>
    </button>
    <button class="tool" data-tool="text" title="Text">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3"/><line x1="12" y1="4" x2="12" y2="20"/><line x1="8" y1="20" x2="16" y2="20"/></svg>
    </button>
    <div class="separator"></div>
    <button id="tags-toggle-btn" title="Toggle Badges Panel">Badges</button>
    <div class="separator"></div>
    <input type="color" id="color-picker" value="#e94560" title="Color">
    <select id="stroke-width" title="Stroke width">
      <option value="2">Thin</option>
      <option value="4" selected>Medium</option>
      <option value="8">Thick</option>
    </select>
    <div class="separator"></div>
    <button id="clear-btn" title="Clear board">Clear</button>
    <div class="separator"></div>
    <button id="zoom-out-btn" class="tool" title="Zoom Out">&minus;</button>
    <span id="zoom-level">100%</span>
    <button id="zoom-in-btn" class="tool" title="Zoom In">+</button>
    <button id="zoom-reset-btn" class="tool" title="Reset Zoom" style="font-size:0.7rem">Fit</button>
    <div class="spacer"></div>
    <button id="theme-toggle-btn" title="Toggle Light/Dark Theme">Light</button>
    <div class="separator"></div>
    <div id="connection-status" class="status connected">Connected</div>
  </div>

  <div id="main-area">
    <!-- Tag palette panel (collapsible sidebar) -->
    <div id="tag-panel" class="tag-panel hidden">
      <div class="tag-panel-header">
        <span>Badges</span>
        <button id="tag-panel-close">&times;</button>
      </div>
      <div id="badge-search-wrap">
        <input type="text" id="badge-search" placeholder="Search badges..." autocomplete="off">
      </div>
      <div id="tag-palette">
        <!-- Tags rendered by JS -->
      </div>
    </div>

    <div id="canvas-container">
      <div id="viewport">
        <canvas id="whiteboard"></canvas>
        <div id="objects-layer"></div>
      </div>
    </div>
  </div>

  <!-- Subprocess picker dialog (used for both create and rename) -->
  <div id="box-dialog" class="dialog-overlay" style="display:none">
    <div class="dialog picker-dialog">
      <h3 id="picker-title">New Process Path</h3>
      <input type="text" id="picker-search" placeholder="Search process or subprocess..." autocomplete="off">
      <div id="picker-list" class="picker-list"></div>
      <div class="dialog-error" id="box-name-error"></div>
      <div class="dialog-actions">
        <button id="box-cancel-btn" class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Box rename dialog (reuses picker) -->
  <div id="rename-dialog" class="dialog-overlay" style="display:none">
    <div class="dialog picker-dialog">
      <h3>Change Process Path</h3>
      <input type="text" id="rename-search" placeholder="Search process or subprocess..." autocomplete="off">
      <div id="rename-list" class="picker-list"></div>
      <div class="dialog-error" id="rename-error"></div>
      <div class="dialog-actions">
        <button id="rename-cancel-btn" class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
