<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; padding: 14px; font-family: -apple-system, sans-serif; font-size: 13px; background: #1a1a2e; color: #e0e0e0; }
    h3 { margin: 0 0 12px; font-size: 15px; color: #e0e0e0; }
    #status { padding: 8px 12px; border-radius: 6px; text-align: center; font-weight: 600; font-size: 12px; }
    .ok { background: #065f46; color: #d1fae5; }
    .err { background: #7f1d1d; color: #fca5a5; }
    .section { margin-top: 14px; }
    .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #718096; letter-spacing: 0.05em; margin-bottom: 6px; }
    .employee-list { max-height: 200px; overflow-y: auto; }
    .employee-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; border-radius: 4px; margin-bottom: 2px; background: #16213e; }
    .employee-item .name { font-weight: 600; font-size: 12px; }
    .employee-item .login { font-size: 11px; color: #718096; }
    .employee-item .perms { font-size: 10px; color: #4a9eff; }
    .employee-item button { background: none; border: none; color: #f87171; cursor: pointer; font-size: 14px; padding: 2px 4px; opacity: 0.6; }
    .employee-item button:hover { opacity: 1; }
    .empty { padding: 12px; text-align: center; color: #718096; font-size: 12px; }
    button.action { margin-top: 8px; width: 100%; padding: 7px; cursor: pointer; background: #0f3460; color: #e0e0e0; border: 1px solid #4a9eff; border-radius: 6px; font-size: 12px; font-weight: 600; }
    button.action:hover { background: #1e3a5f; }
    .url-input { width: 100%; padding: 6px 8px; background: #16213e; border: 1px solid #0f3460; border-radius: 4px; color: #e0e0e0; font-size: 12px; margin-top: 4px; box-sizing: border-box; }
    .url-input:focus { border-color: #4a9eff; outline: none; }
    .help { font-size: 11px; color: #718096; margin-top: 6px; line-height: 1.4; }
  </style>
</head>
<body>
  <h3>Whiteboard Connector</h3>
  <div id="status">Checking...</div>

  <div class="section">
    <div class="section-title">Synced Employees</div>
    <div id="employee-list" class="employee-list"></div>
  </div>

  <button class="action" id="refresh-btn">Refresh</button>

  <div class="section">
    <div class="section-title">Server URL</div>
    <input type="text" id="url-input" class="url-input" placeholder="https://whiteboard.fly.dev">
    <button class="action" id="save-url-btn">Save URL</button>
  </div>

  <div class="help">
    To add employees: Open FCLM Portal &rarr; Employee Permissions page for any employee.
    The extension auto-syncs their permissions to the Whiteboard.
  </div>

  <script src="popup.js"></script>
</body>
</html>
