<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 340px; padding: 14px; font-family: -apple-system, sans-serif; font-size: 13px; background: #1a1a2e; color: #e0e0e0; }
    h3 { margin: 0 0 10px; font-size: 15px; color: #e0e0e0; }
    #status { padding: 8px 12px; border-radius: 6px; text-align: center; font-weight: 600; font-size: 12px; }
    .ok { background: #065f46; color: #d1fae5; }
    .err { background: #7f1d1d; color: #fca5a5; }
    .warn { background: #713f12; color: #fef3c7; }
    .section { margin-top: 12px; }
    .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #718096; letter-spacing: 0.05em; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
    .section-title .count { font-weight: 400; color: #4a9eff; }
    .sync-info { font-size: 11px; color: #718096; margin-bottom: 6px; }
    .roster-list { max-height: 180px; overflow-y: auto; display: flex; flex-wrap: wrap; gap: 3px; padding: 4px 0; }
    .roster-tag { padding: 2px 8px; background: #16213e; border: 1px solid #0f3460; border-radius: 12px; font-size: 11px; font-weight: 500; display: inline-flex; align-items: center; gap: 4px; }
    .roster-tag button { background: none; border: none; color: #f87171; cursor: pointer; font-size: 12px; padding: 0; opacity: 0.4; line-height: 1; }
    .roster-tag button:hover { opacity: 1; }
    .add-row { display: flex; gap: 4px; margin-top: 6px; }
    .add-row input { flex: 1; padding: 5px 8px; background: #16213e; border: 1px solid #0f3460; border-radius: 4px; color: #e0e0e0; font-size: 12px; }
    .add-row input:focus { border-color: #4a9eff; outline: none; }
    .add-row button { padding: 5px 12px; background: #0f3460; color: #e0e0e0; border: 1px solid #4a9eff; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600; white-space: nowrap; }
    button.action { margin-top: 8px; width: 100%; padding: 7px; cursor: pointer; background: #0f3460; color: #e0e0e0; border: 1px solid #4a9eff; border-radius: 6px; font-size: 12px; font-weight: 600; }
    button.action:hover { background: #1e3a5f; }
    button.action.sync { background: #065f46; border-color: #10b981; }
    button.action.sync:hover { background: #047857; }
    button.action:disabled { opacity: 0.5; cursor: not-allowed; }
    .url-section { margin-top: 10px; }
    .url-input { width: 100%; padding: 5px 8px; background: #16213e; border: 1px solid #0f3460; border-radius: 4px; color: #e0e0e0; font-size: 11px; margin-top: 4px; box-sizing: border-box; }
    .url-input:focus { border-color: #4a9eff; outline: none; }
    .help { font-size: 10px; color: #718096; margin-top: 8px; line-height: 1.4; }
  </style>
</head>
<body>
  <h3>Whiteboard Connector</h3>
  <div id="status">Checking...</div>

  <div class="section">
    <div class="section-title">
      <span>AA Roster</span>
      <span class="count" id="roster-count">0</span>
    </div>
    <div id="sync-info" class="sync-info">Never synced</div>
    <div id="roster-list" class="roster-list"></div>
    <div class="add-row">
      <input type="text" id="add-login" placeholder="Add login (e.g. oladeisr)">
      <button id="add-btn">Add</button>
    </div>
  </div>

  <button class="action sync" id="sync-btn">Sync Now</button>

  <div class="url-section">
    <div class="section-title">Server URL</div>
    <input type="text" id="url-input" class="url-input" placeholder="https://ca3de-whiteboard.fly.dev">
    <button class="action" id="save-url-btn" style="margin-top:4px">Save URL</button>
  </div>

  <div class="help">
    Permissions are auto-fetched every 5 hours from FCLM.
    An FCLM tab must be open for sync to work.
  </div>

  <script src="popup.js"></script>
</body>
</html>
